<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAME Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        :root {
            --base-color: #282832;
            --bg-dark: #1e1e26;
            --tab-inactive: #3f3f4d;
            --tab-all: #1a1a21;
            --text-main: #282832;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            overflow: hidden;
            color: var(--text-main);
        }

        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        
        #public-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 40;
            flex-direction: column;
            padding: 10px 10px 0 10px;
        }

        .view-public #public-viewer { display: flex; }
        .view-public #admin-main, .view-public header:not(.public-header) { display: none; }
        .view-public body { background-color: var(--bg-dark); }

        /* タブデザイン */
        .tab-container {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-container::-webkit-scrollbar { display: none; }

        .portfolio-tab {
            padding: 12px 24px;
            background-color: var(--tab-inactive);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            border-radius: 12px 12px 0 0;
            white-space: nowrap;
            transition: all 0.2s ease;
            min-width: 100px;
            text-align: center;
            cursor: pointer;
        }
        .portfolio-tab.all-tab-style { background-color: var(--tab-all); color: #ffffff; }
        .portfolio-tab.active {
            background-color: #ffffff;
            color: var(--text-main);
            padding-top: 15px;
            margin-top: -3px;
        }

        .book-content {
            flex: 1;
            background: #ffffff;
            overflow: hidden;
            position: relative;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }

        /* アニメーション */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .slide-container { position: relative; width: 100%; height: 100%; }
        .slide {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            padding: 2rem; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
            pointer-events: none; opacity: 0;
        }
        .slide.past { transform: translateX(-30px); opacity: 0; }
        .slide.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
        .slide.future { transform: translateX(30px); opacity: 0; }

        #admin-main { height: calc(100vh - 64px); overflow-y: auto; background: #f8f8fa; }
        .image-scroll-container::-webkit-scrollbar { width: 4px; }
        .image-scroll-container::-webkit-scrollbar-thumb { background: #dcdce0; border-radius: 10px; }

        /* スキル・ソフトタグ */
        .software-tag, .skill-tag {
            background-color: var(--base-color); color: #ffffff; padding: 4px 10px;
            font-size: 10px; font-weight: 600; border-radius: 2px; text-transform: uppercase;
            display: inline-block; letter-spacing: 0.05em; text-align: center;
        }
        .skill-tag { padding: 6px 14px; font-size: 11px; min-width: 120px; }
        .skill-tag-small {
            background-color: var(--base-color); color: #ffffff; padding: 4px 10px;
            font-size: 9px; font-weight: 600; border-radius: 2px; text-transform: uppercase;
            display: inline-block; letter-spacing: 0.02em;
        }

        .skill-item { display: flex; align-items: center; gap: 18px; }
        .skill-dots { display: flex; gap: 4px; }
        .skill-eval-dot {
            width: 12px; height: 12px; border-radius: 50%;
            border: 1.5px solid var(--base-color); background-color: transparent;
        }
        .skill-eval-dot.filled { background-color: var(--base-color); }

        /* 経歴タイムライン */
        .timeline-container { position: relative; padding-left: 0; }
        .timeline-line {
            position: absolute; left: 55px; top: 10px; bottom: 30px;
            width: 1px; background-color: #e5e5e8; z-index: 1;
        }
        .timeline-item { position: relative; display: flex; align-items: flex-start; margin-bottom: 40px; z-index: 2; }
        .timeline-year { width: 45px; font-size: 12px; font-weight: bold; color: var(--base-color); text-align: right; opacity: 0.8; line-height: 1.4; }
        .timeline-dot {
            position: absolute; left: 55px; transform: translate(-50%, 0);
            width: 6px; height: 6px; background-color: #d1d1d6; border-radius: 50%; top: 6px; z-index: 3;
        }
        .timeline-detail { padding-left: 30px; flex: 1; }
        .timeline-heading { font-size: 13px; font-weight: bold; margin-bottom: 6px; line-height: 1.4; color: var(--text-main); }
        .timeline-text { font-size: 11px; line-height: 1.8; opacity: 0.8; color: var(--text-main); }

        .admin-card { cursor: pointer; transition: all 0.3s ease; background: white; }
        .admin-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(40, 40, 50, 0.15); }

        .btn-primary { background-color: var(--base-color); color: white; transition: background 0.2s; }
        .btn-primary:hover { background-color: var(--bg-dark); }

        .upload-window {
            background: #ffffff; border: 1px solid #e2e2e8; border-radius: 0.75rem;
            padding: 1rem; display: flex; gap: 1rem; align-items: flex-start;
        }

        @media (max-width: 768px) {
            .slide { padding: 1rem; padding-top: 3rem; }
            .portfolio-tab { padding: 10px 16px; min-width: 80px; font-size: 0.6rem; }
            .timeline-line { left: 50px; }
            .timeline-dot { left: 50px; }
            .timeline-year { width: 40px; font-size: 11px; }
            .timeline-detail { padding-left: 25px; }
        }
    
#back-to-admin { display: none !important; } .view-public #public-viewer { display: flex; position: relative; height: 100vh; } body { background-color: #1e1e26; }
</style>
</head>
<body class="view-public">

    <div id="public-viewer" style="display: flex;">
        <div id="password-gate" class="hidden inset-0 z-[100] flex items-center justify-center bg-[#1e1e26] text-white">
            <div class="text-center space-y-8 animate-fade-up max-w-xs w-full px-6 flex flex-col items-center">
                <div class="space-y-2">
                    <div class="text-[10px] font-bold tracking-[0.4em] uppercase opacity-40">Portfolio Access</div>
                    <h2 class="text-xl font-bold tracking-widest">閲覧パスワード</h2>
                </div>
                <div class="flex flex-col items-center gap-4 w-full">
                    <input type="password" id="viewer-password-input" class="border border-[#3f3f4d] rounded-lg p-4 text-center text-sm outline-none focus:border-white w-full bg-[#282832] text-white" placeholder="Password">
                    <button onclick="checkPublicPassword()" class="bg-white text-[#282832] py-4 rounded-lg text-xs font-bold uppercase tracking-widest w-full shadow-md hover:bg-gray-100 transition-colors">閲覧する</button>
                    <p id="password-error" class="text-[10px] text-red-400 font-bold opacity-0 transition-opacity h-4">パスワードが正しくありません</p>
                </div>
            </div>
        </div>
        <div id="public-tabs" class="tab-container" style="display: flex;"></div>
        <div class="book-content relative">
            <div id="section-WORKS" class="section-view h-full">
                <div id="slide-wrapper" class="slide-container"></div>
                <div class="absolute inset-y-0 left-0 w-16 md:w-32 flex items-center justify-center cursor-pointer group z-40" onclick="prevSlide()"><div class="animate-prev opacity-20 group-hover:opacity-100 transition-opacity"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#282832" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></div></div>
                <div class="absolute inset-y-0 right-0 w-16 md:w-32 flex items-center justify-center cursor-pointer group z-40" onclick="nextSlide()"><div class="animate-next opacity-20 group-hover:opacity-100 transition-opacity"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#282832" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div></div>
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-[9px] font-mono tracking-widest text-[#282832] opacity-40"><span id="page-counter">00 / 00</span></div>
            </div>
            <div id="section-PROFILE" class="section-view hidden h-full"><div id="profile-dynamic-container" class="h-full"></div></div>
            <div id="section-OTHERS" class="section-view hidden scroll-section text-[#282832] image-scroll-container"><div class="max-w-3xl mx-auto px-6 slide-inner"><div id="others-public-list" class="space-y-24"></div></div></div>
        </div>
    </div>
<script>
let currentSlide = 0; let currentActiveTab = "WORKS"; let currentGenreFilter = "ALL"; let isAuthorized = false; let isAdmin = false;

        const hasPassword = false;
        const initialData = {"portfolioItems":[],"othersItems":[],"profileData":{"name":"NAME","reading":"NAME READING","introHeading":"INTRO","bio":"BIO","practicalSkills":[],"learningSkills":[],"career":[],"password":""}};
        let portfolioItems = initialData.portfolioItems || [];
        let othersItems = initialData.othersItems || [];
        let profileData = initialData.profileData || {};
                
        function saveProject() {
            const data = { portfolioItems, othersItems, profileData };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'portfolio_backup.json'; a.click();
        }

        function loadProject(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.portfolioItems) { portfolioItems = data.portfolioItems; localStorage.setItem('portfolioItems', JSON.stringify(portfolioItems)); }
                    if (data.othersItems) { othersItems = data.othersItems; localStorage.setItem('othersItems', JSON.stringify(othersItems)); }
                    if (data.profileData) { profileData = data.profileData; localStorage.setItem('profileData', JSON.stringify(profileData)); }
                    alert('データを読み込みました');
                    location.reload();
                } catch (err) {
                    alert('ファイルの読み込みに失敗しました');
                }
            };
            reader.readAsText(file);
        }

        function populateYears() {
            const dateEl = document.getElementById('date'); if(!dateEl) return;
            const currentYear = new Date().getFullYear();
            for (let i = currentYear; i >= 2010; i--) { 
                const opt = document.createElement('option'); opt.value = i; opt.textContent = i; dateEl.appendChild(opt); 
            }
        }

        function setAdminTab(tab) {
            document.querySelectorAll('.admin-tab-view').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('admin-view-' + tab);
            if(target) target.classList.remove('hidden');
            document.querySelectorAll('[id^="admin-tab-"]').forEach(el => { el.classList.remove('text-[#282832]'); el.classList.add('text-gray-300'); });
            const tabBtn = document.getElementById('admin-tab-' + tab.toLowerCase());
            if(tabBtn) tabBtn.classList.replace('text-gray-300', 'text-[#282832]');
            if(tab === 'WORKS') renderItems();
            if(tab === 'PROFILE') renderAdminProfile();
            if(tab === 'OTHERS') renderOthers();
        }

        function addSkillInput(type, skill = { name: "", level: 5 }) {
            const containerId = type === 'practical' ? 'admin-skills-practical-container' : 'admin-skills-learning-container';
            const container = document.getElementById(containerId); if(!container) return;
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-gray-50 p-2 rounded";
            let levelSelect = type === 'practical' ? `
                <select class="bg-white border text-xs p-1 rounded skill-level-input">
                    ${[1,2,3,4,5].map(v => `<option value="${v}" ${skill.level == v ? 'selected' : ''}>${v}</option>`).join('')}
                </select>` : "";
            div.innerHTML = `
                <input type="text" placeholder="スキル名" value="${skill.name}" class="flex-1 bg-white border text-xs p-1 rounded outline-none skill-name-input">
                ${levelSelect}
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-2">×</button>
            `;
            container.appendChild(div);
        }

        function addCareerInput(entry = { year: "", title: "", detail: "" }) {
            const container = document.getElementById('admin-careers-container'); if(!container) return;
            const div = document.createElement('div');
            div.className = "bg-gray-50 p-3 rounded space-y-2 relative";
            div.innerHTML = `
                <div class="grid grid-cols-4 gap-2">
                    <input type="text" placeholder="年号" value="${entry.year}" class="bg-white border text-xs p-1 rounded outline-none career-year-input">
                    <input type="text" placeholder="見出し" value="${entry.title}" class="col-span-3 bg-white border text-xs p-1 rounded outline-none career-title-input">
                </div>
                <textarea placeholder="詳細" rows="3" class="w-full bg-white border text-xs p-1 rounded outline-none career-detail-input">${entry.detail}</textarea>
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-1 right-2 text-red-400">×</button>
            `;
            container.appendChild(div);
        }

        function renderAdminProfile() {
            document.getElementById('admin-profile-name').value = profileData.name;
            document.getElementById('admin-profile-reading').value = profileData.reading || "";
            document.getElementById('admin-profile-intro-heading').value = profileData.introHeading || "";
            document.getElementById('admin-profile-bio').value = profileData.bio;
            document.getElementById('admin-profile-password').value = profileData.password || "";
            document.getElementById('admin-skills-practical-container').innerHTML = "";
            document.getElementById('admin-skills-learning-container').innerHTML = "";
            document.getElementById('admin-careers-container').innerHTML = "";
            (profileData.practicalSkills || []).forEach(s => addSkillInput('practical', s));
            (profileData.learningSkills || []).forEach(s => addSkillInput('learning', s));
            (profileData.career || []).forEach(c => addCareerInput(c));
        }

        function saveProfile() {
            profileData.name = document.getElementById('admin-profile-name').value;
            profileData.reading = document.getElementById('admin-profile-reading').value;
            profileData.introHeading = document.getElementById('admin-profile-intro-heading').value;
            profileData.bio = document.getElementById('admin-profile-bio').value;
            profileData.password = document.getElementById('admin-profile-password').value;
            profileData.practicalSkills = Array.from(document.querySelectorAll('#admin-skills-practical-container > div')).map(el => ({ name: el.querySelector('.skill-name-input').value, level: parseInt(el.querySelector('.skill-level-input').value) }));
            profileData.learningSkills = Array.from(document.querySelectorAll('#admin-skills-learning-container > div')).map(el => ({ name: el.querySelector('.skill-name-input').value }));
            profileData.career = Array.from(document.querySelectorAll('#admin-careers-container > div')).map(el => ({ year: el.querySelector('.career-year-input').value, title: el.querySelector('.career-title-input').value, detail: el.querySelector('.career-detail-input').value }));
            localStorage.setItem('profileData', JSON.stringify(profileData));
            alert("プロフィールを保存しました");
        }

        function setActiveTab(tabType, value = null) {
            currentActiveTab = tabType; currentSlide = 0;
            document.querySelectorAll('.section-view').forEach(el => el.classList.add('hidden'));
            if (tabType === 'PROFILE') { document.getElementById('section-PROFILE').classList.remove('hidden'); renderProfile(); } 
            else if (tabType === 'OTHERS') { document.getElementById('section-OTHERS').classList.remove('hidden'); renderOthers(); } 
            else if (tabType === 'WORKS') { currentGenreFilter = value; document.getElementById('section-WORKS').classList.remove('hidden'); renderItems(); }
            renderTabs();
        }

        function renderTabs() {
            const container = document.getElementById('public-tabs'); if(!container) return;
            container.innerHTML = "";
            container.appendChild(createTabEl("All", currentActiveTab === 'WORKS' && currentGenreFilter === 'ALL', () => setActiveTab('WORKS', 'ALL')));
            const existingGenres = [...new Set(portfolioItems.map(i => i.genre))];
            ["Digital", "Print", "Promotion"].forEach(g => {
                if(existingGenres.includes(g)) container.appendChild(createTabEl(g, currentActiveTab === 'WORKS' && currentGenreFilter === g, () => setActiveTab('WORKS', g)));
            });
            if(othersItems.length > 0) container.appendChild(createTabEl("Process", currentActiveTab === 'OTHERS', () => setActiveTab('OTHERS')));
            container.appendChild(createTabEl("Profile", currentActiveTab === 'PROFILE', () => setActiveTab('PROFILE')));
        }

        function createTabEl(label, isActive, onClick) {
            const btn = document.createElement('button'); 
            btn.className = `portfolio-tab ${isActive ? 'active' : ''} ${label === 'All' ? 'all-tab-style' : ''}`; 
            btn.innerText = label; btn.onclick = onClick; return btn;
        }

        function switchView(mode) {
            isAdmin = (mode === 'admin'); document.body.classList.toggle('view-public', !isAdmin);
            const gate = document.getElementById('password-gate');
            const tabs = document.getElementById('public-tabs');
            if (isAdmin) {
                setAdminTab('WORKS');
            } else {
                if (profileData.password && !isAuthorized) {
                    gate.classList.remove('hidden');
                    tabs.style.display = "none";
                } else {
                    gate.classList.add('hidden');
                    tabs.style.display = "flex";
                    setActiveTab('WORKS', 'ALL');
                }
            }
        }

        function handleManagerPasswordCheck() {
            const input = document.getElementById('viewer-password-input');
            const error = document.getElementById('password-error');
            if (input.value === profileData.password) {
                isAuthorized = true;
                document.getElementById('password-gate').classList.add('hidden');
                document.getElementById('public-tabs').style.display = "flex";
                setActiveTab('WORKS', 'ALL');
                error.style.opacity = 0;
            } else {
                error.style.opacity = 1;
                input.value = "";
            }
        }

        function getProfileHtml() {
            const practicalHtml = (profileData.practicalSkills || []).map(s => `
                <div class="skill-item">
                    <div class="skill-tag">${s.name}</div>
                    <div class="skill-dots">
                        ${[1,2,3,4,5].map(v => `<div class="skill-eval-dot ${v <= s.level ? 'filled' : ''}"></div>`).join('')}
                    </div>
                </div>
            `).join('');

            const learningHtml = (profileData.learningSkills || []).map(s => `
                <div class="skill-tag-small">${s.name}</div>
            `).join('');

            const careerHtml = (profileData.career || []).map(c => `
                <div class="timeline-item">
                    <div class="timeline-year font-bold">${c.year}</div>
                    <div class="timeline-dot"></div>
                    <div class="timeline-detail">
                        <div class="timeline-heading font-bold">${c.title}</div>
                        <p class="timeline-text whitespace-pre-wrap opacity-80">${c.detail}</p>
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="grid grid-cols-1 md:grid-cols-12 h-full overflow-hidden slide-inner">
                    <div class="md:col-span-5 p-8 md:p-16 overflow-y-auto image-scroll-container border-r border-gray-50 flex flex-col">
                        <div class="mb-12">
                            <h2 class="text-4xl font-bold tracking-widest text-[#282832] mb-1">${profileData.name}</h2>
                            <div class="text-[10px] font-bold tracking-[0.3em] uppercase opacity-40 mb-10">${profileData.reading || 'PROFILE'}</div>
                            <div class="mb-6">
                                <h3 class="text-sm font-bold mb-4 text-[#282832]">${profileData.introHeading || ''}</h3>
                                <p class="text-[11px] leading-loose opacity-80 whitespace-pre-wrap text-[#282832]">${profileData.bio}</p>
                            </div>
                        </div>
                        <div class="space-y-12 mt-auto pt-10 border-t border-gray-100">
                            <div class="space-y-4">${practicalHtml}</div>
                            <div class="flex flex-wrap gap-2 pt-2">${learningHtml}</div>
                        </div>
                    </div>
                    <div class="md:col-span-7 bg-[#fdfdfd] p-8 md:p-16 overflow-y-auto image-scroll-container">
                        <div class="timeline-container max-w-lg mx-auto">
                            <div class="timeline-line"></div>
                            ${careerHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProfile() { const container = document.getElementById('profile-dynamic-container'); if(container) container.innerHTML = getProfileHtml(); }

        function renderItems() {
            const grid = document.getElementById('portfolio-grid'); const slideWrapper = document.getElementById('slide-wrapper');
            if(!grid || !slideWrapper) return;
            if(isAdmin) grid.innerHTML = ""; slideWrapper.innerHTML = "";
            const sortedItems = [...portfolioItems].sort((a, b) => b.date - a.date);
            let filteredItems = currentGenreFilter !== "ALL" ? sortedItems.filter(i => i.genre === currentGenreFilter) : sortedItems;
            if(isAdmin) {
                sortedItems.forEach(item => {
                    const card = document.createElement('div'); card.className = "rounded-2xl overflow-hidden border border-gray-100 shadow-sm relative group admin-card";
                    card.onclick = () => editItem(item.id);
                    card.innerHTML = `
                        <div class="aspect-[4/3] bg-gray-50"><img src="${item.images?.[0]?.data || ''}" class="w-full h-full object-cover"></div>
                        <div class="p-4 flex justify-between items-center">
                            <h3 class="font-bold text-[10px] text-[#282832] uppercase tracking-wider">${item.title}</h3>
                            <button onclick="event.stopPropagation(); deleteItem(${item.id})" class="p-1.5 bg-red-50 rounded-full hover:bg-red-100 text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } else {
                const slidesToRender = []; if (currentGenreFilter === "ALL") slidesToRender.push({ type: 'profile' }); filteredItems.forEach(item => slidesToRender.push({ type: 'work', data: item }));
                slidesToRender.forEach((slideItem, index) => {
                    const slide = document.createElement('div'); slide.className = `slide ${index === currentSlide ? 'active' : (index < currentSlide ? 'past' : 'future')}`;
                    if (slideItem.type === 'profile') slide.innerHTML = getProfileHtml();
                    else {
                        const item = slideItem.data;
                        const mainHtml = (item.images || []).map(img => `
                            <div class="mb-12 slide-inner">
                                ${img.label ? `<div class="text-[9px] font-bold tracking-[0.2em] mb-2 text-[#282832] opacity-60 uppercase">${img.label}</div>` : ''}
                                <img src="${img.data}" class="w-full rounded-lg border border-gray-50 shadow-sm">
                            </div>
                        `).join('');
                        const matHtml = (item.materials || []).map(img => `
                            <div class="mt-20 slide-inner">
                                <div class="text-[9px] font-bold tracking-[0.3em] mb-4 text-[#282832] opacity-60 uppercase">${img.type}</div>
                                <img src="${img.data}" class="w-full opacity-70 grayscale hover:grayscale-0 transition-all rounded-lg">
                            </div>
                        `).join('');
                        slide.innerHTML = `
                            <div class="max-w-7xl w-full grid grid-cols-1 md:grid-cols-12 bg-white h-full max-h-[85vh] overflow-hidden slide-inner">
                                <div class="md:col-span-7 bg-[#fdfdfd] p-8 md:p-12 overflow-y-auto image-scroll-container">
                                    <div class="max-w-lg mx-auto">${mainHtml}${matHtml}</div>
                                </div>
                                <div class="md:col-span-5 p-8 md:p-16 flex flex-col justify-center">
                                    <div class="mb-8">
                                        ${item.client ? `<div class="text-[11px] opacity-100 mb-2 font-medium text-[#282832]">${item.client}</div>` : ''}
                                        <h2 class="text-2xl md:text-3xl font-bold text-[#282832] mb-6 leading-tight tracking-tight">${item.title}</h2>
                                        <div class="text-sm font-semibold text-[#282832] mb-5 leading-relaxed opacity-100">${item.issue || ''}</div>
                                        <p class="text-[11px] text-[#282832] leading-loose opacity-100 whitespace-pre-wrap">${item.description}</p>
                                    </div>
                                    <div class="mt-auto space-y-4 pt-8 border-t border-gray-50">
                                        <div class="flex flex-wrap gap-2">${(item.software || []).map(sw => `<div class="software-tag">${sw}</div>`).join('')}</div>
                                        <div class="space-y-1">
                                            <div class="text-[9px] font-bold tracking-widest text-[#282832] opacity-70 uppercase">${(item.roles || []).join(' / ')}</div>
                                            <div class="font-mono text-[9px] text-[#282832] opacity-70 font-bold">${item.date}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    slideWrapper.appendChild(slide);
                });
                updatePageCounter(slidesToRender.length);
            }
        }

        function nextSlide() { const c = document.querySelectorAll('.slide').length; if (currentSlide < c - 1) { currentSlide++; renderItems(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; renderItems(); } }
        function updatePageCounter(t) { const el = document.getElementById('page-counter'); if (el) el.innerText = `${(t === 0 ? 0 : currentSlide + 1).toString().padStart(2, '0')} / ${t.toString().padStart(2, '0')}`; }

        function renderOthers() {
            const adminList = document.getElementById('others-admin-list'); const publicList = document.getElementById('others-public-list');
            if(adminList) adminList.innerHTML = ""; if(publicList) publicList.innerHTML = "";
            othersItems.forEach(item => {
                if(adminList) { 
                    const aDiv = document.createElement('div'); aDiv.className = "flex justify-between items-center bg-white border border-gray-100 p-4 rounded-xl"; 
                    aDiv.innerHTML = `<span class="text-xs font-bold text-[#282832]">${item.title}</span><button onclick="deleteOthers(${item.id})" class="text-red-400">×</button>`; 
                    adminList.appendChild(aDiv); 
                }
                if(publicList) { 
                    const pDiv = document.createElement('div'); pDiv.className = "space-y-6 slide-inner"; 
                    pDiv.innerHTML = `<h3 class="text-sm font-bold tracking-widest uppercase border-l-2 border-[#282832] pl-4 text-[#282832]">${item.title}</h3><p class="text-[11px] leading-loose opacity-70 whitespace-pre-wrap text-[#282832] animate-fade-up">${item.desc}</p>`; 
                    publicList.appendChild(pDiv); 
                }
            });
        }
        function saveOthersItem() { const t = document.getElementById('others-title').value; const d = document.getElementById('others-desc').value; if (!t) return; othersItems.unshift({ id: Date.now(), title:t, desc:d }); localStorage.setItem('othersItems', JSON.stringify(othersItems)); document.getElementById('others-modal').classList.add('hidden'); renderOthers(); }
        function openOthersModal() { document.getElementById('others-modal').classList.remove('hidden'); }
        function deleteOthers(id) { if(confirm('削除しますか？')) { othersItems = othersItems.filter(i => i.id !== id); localStorage.setItem('othersItems', JSON.stringify(othersItems)); renderOthers(); } }

        function editItem(id) {
            const i = portfolioItems.find(it => it.id === id); if (!i) return;
            toggleModal(true); document.getElementById('edit-id').value = i.id; document.getElementById('modal-title-text').innerText = "実績を編集する";
            document.getElementById('title').value = i.title; document.getElementById('genre').value = i.genre; document.getElementById('issue').value = i.issue; document.getElementById('description').value = i.description; document.getElementById('date').value = i.date;
            document.querySelectorAll('input[name="software"]').forEach(cb => cb.checked = (i.software || []).includes(cb.value));
            document.querySelectorAll('input[name="role"]').forEach(cb => cb.checked = (i.roles || []).includes(cb.value));
            currentImages = i.images ? JSON.parse(JSON.stringify(i.images)) : []; currentMaterials = i.materials ? JSON.parse(JSON.stringify(i.materials)) : [];
            renderUploadWindows();
        }

        function addWindow(cat) { if (cat === 'main') currentImages.push({ data: null, label: "" }); else currentMaterials.push({ data: null, type: "提案資料" }); renderUploadWindows(); }
        function removeWindow(cat, i) { if (cat === 'main') currentImages.splice(i, 1); else currentMaterials.splice(i, 1); renderUploadWindows(); }
        function handleFileSelect(cat, i, e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { if (cat === 'main') currentImages[i].data = ev.target.result; else currentMaterials[i].data = ev.target.result; renderUploadWindows(); }; r.readAsDataURL(f); }
        function renderUploadWindows() {
            const m = document.getElementById('main-windows-container'); const s = document.getElementById('material-windows-container');
            if(!m || !s) return;
            m.innerHTML = currentImages.map((it, i) => `
                <div class="upload-window">
                    <div class="w-12 h-12 bg-gray-50 rounded relative overflow-hidden flex-shrink-0">
                        ${it.data ? `<img src="${it.data}" class="w-full h-full object-cover">` : ''}
                        <input type="file" onchange="handleFileSelect('main', ${i}, event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <input type="text" value="${it.label || ''}" oninput="currentImages[${i}].label=this.value" placeholder="見出し" class="flex-1 bg-transparent text-[10px] outline-none border-b focus:border-[#282832]">
                    <button type="button" onclick="removeWindow('main', ${i})" class="text-gray-300">×</button>
                </div>
            `).join('');
            s.innerHTML = currentMaterials.map((it, i) => `
                <div class="upload-window">
                    <div class="w-12 h-12 bg-gray-50 rounded relative overflow-hidden flex-shrink-0">
                        ${it.data ? `<img src="${it.data}" class="w-full h-full object-cover">` : ''}
                        <input type="file" onchange="handleFileSelect('material', ${i}, event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <select onchange="currentMaterials[${i}].type=this.value" class="flex-1 bg-transparent text-[10px] outline-none border-b appearance-none cursor-pointer focus:border-[#282832]">
                        <option value="提案資料" ${it.type === '提案資料' ? 'selected' : ''}>提案資料</option>
                        <option value="ワイヤーフレーム" ${it.type === 'ワイヤーフレーム' ? 'selected' : ''}>ワイヤーフレーム</option>
                        <option value="イメージ" ${it.type === 'イメージ' ? 'selected' : ''}>イメージ</option>
                    </select>
                    <button type="button" onclick="removeWindow('material', ${i})" class="text-gray-300">×</button>
                </div>
            `).join('');
        }

        function toggleModal(s) { 
            const m = document.getElementById('modal'); m.classList.toggle('hidden', !s); 
            if(s && !document.getElementById('edit-id').value) { document.getElementById('portfolio-form').reset(); document.getElementById('edit-id').value = ""; document.getElementById('modal-title-text').innerText = "実績を登録する"; currentImages=[{data:null, label:""}]; currentMaterials=[]; }
            if(s) renderUploadWindows(); else document.getElementById('edit-id').value = "";
        }

        document.getElementById('portfolio-form').addEventListener('submit', (e) => {
            e.preventDefault(); const validImages = currentImages.filter(img => img.data !== null); if(validImages.length === 0) return alert("画像を追加してください");
            const s = Array.from(document.querySelectorAll('input[name="software"]:checked')).map(cb => cb.value);
            const r = Array.from(document.querySelectorAll('input[name="role"]:checked')).map(cb => cb.value);
            const editId = document.getElementById('edit-id').value;
            const itemData = { id: editId ? parseInt(editId) : Date.now(), client: document.getElementById('client').value, title: document.getElementById('title').value, genre: document.getElementById('genre').value, issue: document.getElementById('issue').value, description: document.getElementById('description').value, date: parseInt(document.getElementById('date').value), software:s, roles:r, images: validImages, materials: currentMaterials.filter(m => m.data) };
            if (editId) { const idx = portfolioItems.findIndex(it => it.id === parseInt(editId)); portfolioItems[idx] = itemData; } else { portfolioItems.unshift(itemData); }
            localStorage.setItem('portfolioItems', JSON.stringify(portfolioItems)); renderItems(); toggleModal(false);
        });

        function deleteItem(id) { if(confirm('削除しますか？')) { portfolioItems = portfolioItems.filter(it => it.id !== id); localStorage.setItem('portfolioItems', JSON.stringify(portfolioItems)); renderItems(); } }
        
        window.onload = () => {
            if (hasPassword) {
                // Wait for password input
            } else {
                isAuthorized = true;
                setActiveTab('WORKS', 'ALL');
            }
        };

        function checkPublicPassword() {
            const input = document.getElementById('viewer-password-input');
            const error = document.getElementById('password-error');
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedData, input.value);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if(!decryptedStr) throw new Error();
                const data = JSON.parse(decryptedStr);
                portfolioItems = data.portfolioItems || []; 
                othersItems = data.othersItems || []; 
                profileData = data.profileData || {};
                
                isAuthorized = true;
                document.getElementById('password-gate').classList.replace('fixed', 'hidden');
                document.getElementById('public-tabs').style.display = 'flex';
                setActiveTab('WORKS', 'ALL');
            } catch(e) {
                error.style.opacity = 1;
                input.value = '';
            }
        }
            
</script>
</body>
</html>
